# Codex CLI Project Configuration
# This file enables project-specific Codex settings

# Default model configuration
model = "gpt-5.4"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"

# Web search
web_search = "live"

# Approval policy
approval_policy = "never"

# Feature toggles
[features]
skills = true

# Skills configuration - enable project skills
[[skills.config]]
enabled = true
path = ".codex/skills/context-loader"

# Response style
verbosity = "medium"
